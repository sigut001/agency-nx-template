name: Production Release 🚀

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build & SSG
        run: |
          npx nx build @temp-nx/agency-shell
          npx nx run @temp-nx/agency-shell:generate-seo
          npx nx run @temp-nx/agency-shell:prerender
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Semantic Release Audit
        run: npx jiti scripts/generate-report.ts

      - name: Deployment
        run: npx nx deploy @temp-nx/agency-shell
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Determine Version Bump
        id: version_bump
        run: |
          # Default to patch
          BUMP_TYPE="patch"

          # Get the last commit message (or relevant range)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit Message: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" =~ "BREAKING CHANGE" ]] || [[ "$COMMIT_MSG" =~ "!" ]]; then
            BUMP_TYPE="major"
            echo "💥 BREAKING CHANGE detected"
          elif [[ "$COMMIT_MSG" =~ "^feat" ]]; then
            BUMP_TYPE="minor"
            echo "✨ Feature detected"
          else
            echo "🐛 Fix/Chore detected"
          fi

          echo "bump=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Determined bump type: $BUMP_TYPE"

      - name: Semantic Versioning & Tagging
        run: |
          BUMP_TYPE="${{ steps.version_bump.outputs.bump }}"
          echo "Applying version bump: $BUMP_TYPE"

          # Configure git user for the commit
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          npm version $BUMP_TYPE -m "chore(release): %s [skip ci]"
          git push origin main --tags
