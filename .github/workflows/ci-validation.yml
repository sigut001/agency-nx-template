name: CI Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate-keys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 0: Validate Keys'
        run: npx nx run @temp-nx/company-website:validate:keys

  validate-firebase:
    needs: validate-keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 1a: Validate Firebase'
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: npx nx run @temp-nx/company-website:validate:firebase

  validate-brevo:
    needs: validate-keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 1b: Validate Brevo'
        env:
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}
        run: npx nx run @temp-nx/company-website:validate:brevo

  validate-imagekit:
    needs: validate-keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 1c: Validate ImageKit'
        env:
          VITE_IMAGEKIT_PUBLIC_KEY: ${{ secrets.VITE_IMAGEKIT_PUBLIC_KEY }}
          VITE_IMAGEKIT_PRIVATE_KEY: ${{ secrets.VITE_IMAGEKIT_PRIVATE_KEY }}
        run: npx nx run @temp-nx/company-website:validate:imagekit

  validate-recaptcha:
    needs: validate-keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 1d: Validate reCAPTCHA'
        env:
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
        run: npx nx run @temp-nx/company-website:validate:recaptcha

  build-and-deploy:
    needs:
      [validate-firebase, validate-brevo, validate-imagekit, validate-recaptcha]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps

      - name: 'Phase 1e: Sync SEO Metadata'
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: npx nx run @temp-nx/company-website:sync:seo

      - name: 'Lint'
        run: npx nx run @temp-nx/company-website:lint

      - name: 'Unit Tests'
        run: npx nx run @temp-nx/company-website:test

      - name: 'Production Build'
        run: npx nx run @temp-nx/company-website:build --configuration=production

      - name: 'Phase 2: Generate Sitemap & Robots'
        run: npx nx run @temp-nx/company-website:generate-sitemap

      - name: 'Deploy to Firebase Preview'
        id: deploy_preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: 'ci-${{ github.event.number }}'

      - name: 'Phase 3: Live Validation'
        run: npx nx run @temp-nx/company-website:validate-deployed-app --url=${{ steps.deploy_preview.outputs.details_url }}
        env:
          VITE_PROJECT_URL: ${{ steps.deploy_preview.outputs.details_url }}
          BASE_URL: ${{ steps.deploy_preview.outputs.details_url }}

      - name: 'Phase 4: Lighthouse Performance Audit'
        run: npx tsx scripts/pipeline/06-run-lighthouse.ts ${{ steps.deploy_preview.outputs.details_url }}
        env:
          BASE_URL: ${{ steps.deploy_preview.outputs.details_url }}

      - name: 'Generate Unified Quality Report'
        run: npx tsx scripts/automation/generate-report.ts

      - name: 'Upload CI Quality Reports'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports-ci-${{ github.run_id }}
          path: reports/
          retention-days: 7
