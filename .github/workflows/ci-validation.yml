name: CI Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: .

      - name: NX Report
        run: npx nx report
        working-directory: .

      - name: Lint
        run: npx nx run @temp-nx/company-website:lint
        working-directory: .

      - name: Unit Tests
        run: npx nx run @temp-nx/company-website:test
        working-directory: .

      - name: Config Validation
        run: npx nx run @temp-nx/company-website:validate-config
        working-directory: .

      - name: Production Build
        run: npx nx run @temp-nx/company-website:build --configuration=production
        working-directory: .

      - name: Generate SEO Files
        run: npx nx run @temp-nx/company-website:generate-seo
        working-directory: .

      # Deployment to Firebase Hosting (Preview)
      # Wir nutzen hier Platzhalter-Secrets, die der User noch anlegen muss
      - name: Deploy to Test Domain
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "Deploying to Firebase Test Domain..."
          # npx firebase-tools deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --token $FIREBASE_TOKEN
        working-directory: .

      - name: Validate Deployed App
        run: npx nx run @temp-nx/company-website:validate-deployed-app --url=https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app
        working-directory: .
