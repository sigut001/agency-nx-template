name: 'CD: Production Release (WF-3) 🚀'

on:
  push:
    branches: [main]

jobs:
  orchestration-check:
    name: 'Standard Versioning Logic'
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.version_type.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine Version Bump
        id: version_type
        shell: bash
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if [[ "$COMMIT_MSG" == *"#major"* ]]; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" == *"#minor"* ]]; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

  business-logic-deploy:
    name: 'Production Deployment'
    needs: orchestration-check
    runs-on: ubuntu-latest
    outputs:
      details_url: ${{ steps.deploy_prod.outputs.details_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Create Firebase Service Account
        run: |
          node -e "require('fs').writeFileSync('firebase-service-account.json', JSON.stringify({type: 'service_account', project_id: process.env.PROJECT_ID, private_key: process.env.PRIVATE_KEY.replace(/\\\\n/g, '\\n'), client_email: process.env.CLIENT_EMAIL}))"
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}

      - name: 'Install Playwright Browsers'
        run: npx playwright install chromium --with-deps

      - name: 'Phase 04: Build & Deploy'
        run: npx nx run @temp-nx/company-website:phase-04
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_HUBSPOT_PORTAL_ID: ${{ secrets.VITE_HUBSPOT_PORTAL_ID }}
          VITE_HUBSPOT_REGION: ${{ secrets.VITE_HUBSPOT_REGION }}
          VITE_IMAGEKIT_PUBLIC_KEY: ${{ secrets.VITE_IMAGEKIT_PUBLIC_KEY }}
          VITE_IMAGEKIT_PRIVATE_KEY: ${{ secrets.VITE_IMAGEKIT_PRIVATE_KEY }}
          VITE_IMAGEKIT_URL_ENDPOINT: ${{ secrets.VITE_IMAGEKIT_URL_ENDPOINT }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}

      - name: 'Deploy to Firebase Hosting (Live)'
        id: deploy_prod
        run: |
          npx firebase deploy --only hosting --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --json > deploy_output.json
          # Extract the hosting URL for the next job
          DETAILS_URL=$(cat deploy_output.json | node -e "const out = JSON.parse(require('fs').readFileSync(0, 'utf8')); console.log(out.result.hosting[0].url)")
          echo "details_url=$DETAILS_URL" >> $GITHUB_OUTPUT
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json

  smoke-test:
    name: 'Production Smoke Test'
    needs: business-logic-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: 'Install Playwright Browsers'
        run: npx playwright install chromium --with-deps
      - name: 'Phase 05: Performance & Final Validation'
        run: npx nx run @temp-nx/company-website:phase-05
        env:
          BASE_URL: ${{ needs.business-logic-deploy.outputs.details_url }}
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_HUBSPOT_PORTAL_ID: ${{ secrets.VITE_HUBSPOT_PORTAL_ID }}
          VITE_HUBSPOT_REGION: ${{ secrets.VITE_HUBSPOT_REGION }}
          VITE_IMAGEKIT_PUBLIC_KEY: ${{ secrets.VITE_IMAGEKIT_PUBLIC_KEY }}
          VITE_IMAGEKIT_PRIVATE_KEY: ${{ secrets.VITE_IMAGEKIT_PRIVATE_KEY }}
          VITE_IMAGEKIT_URL_ENDPOINT: ${{ secrets.VITE_IMAGEKIT_URL_ENDPOINT }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}

  standard-finalize:
    name: 'Versioning & Release (Shell)'
    needs: [orchestration-check, business-logic-deploy, smoke-test]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 'Bump Version & Tag'
        id: bump
        run: |
          npx tsx scripts-new/utils/bump-version.ts ${{ needs.orchestration-check.outputs.bump_type }}
          NEW_VERSION=$(node -p "require('./package.json').version")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --tags
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ steps.bump.outputs.new_version }}'
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Upload Production Build & Reports'
        uses: actions/upload-artifact@v4
        with:
          name: production-release-v${{ steps.bump.outputs.new_version }}
          path: |
            apps/company-website/build/
            reports/

  rollback:
    name: 'Platform Recovery & Double-Rollback'
    needs: [business-logic-deploy, smoke-test]
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create Firebase Service Account
        run: |
          node -e "require('fs').writeFileSync('firebase-service-account.json', JSON.stringify({type: 'service_account', project_id: process.env.PROJECT_ID, private_key: process.env.PRIVATE_KEY.replace(/\\\\n/g, '\\n'), client_email: process.env.CLIENT_EMAIL}))"
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}

      - name: 'Business Rollback: Firebase Hosting'
        if: needs.business-logic-deploy.result == 'success'
        run: npx firebase hosting:rollback --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json

      - name: 'Platform Rollback: Git Revert Main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get the last merge commit ID
          LAST_MERGE=$(git log --merges -n 1 --format="%H")

          if [ -z "$LAST_MERGE" ]; then
            echo "No merge commit found. Skipping revert."
            exit 0
          fi

          echo "Reverting Merge Commit: $LAST_MERGE"

          # Perform revert (m 1 indicates we want the first parent, which is 'main')
          git revert -m 1 $LAST_MERGE --no-edit

          # Push to main to restore state
          git push origin main --no-verify
