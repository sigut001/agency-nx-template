name: PR Quality Audit 🛡️

on:
  pull_request:
    branches: [main]

jobs:
  validate-label:
    if: ${{ !github.event.act }}
    runs-on: ubuntu-latest
    steps:
      - name: 'Check PR Label or Title'
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')
          TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title --jq '.title')
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq '.body')

          if echo "$LABELS" | grep -qE 'major|minor|patch' || [[ "$TITLE" =~ "#major" || "$TITLE" =~ "#minor" || "$TITLE" =~ "#patch" ]] || [[ "$BODY" =~ "#major" || "$BODY" =~ "#minor" || "$BODY" =~ "#patch" ]]; then
            echo "✅ PR has valid versioning metadata (Label or #tag in title/body)"
            exit 0
          else
            echo "❌ PR must have a version label (major, minor, patch) OR a #tag in the title/body (e.g., '#minor')"
            echo ""
            echo "Add a label with:"
            echo "  gh pr edit ${{ github.event.pull_request.number }} --add-label \"minor\""
            echo ""
            echo "Or add '#minor' to your PR title."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-keys:
    needs: validate-label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 0: Validate Keys'
        run: npx nx run @temp-nx/company-website:validate:keys

  validate-firebase:
    needs: validate-keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 1a: Validate Firebase'
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: npx nx run @temp-nx/company-website:validate:firebase

  validate-brevo:
    needs: validate-keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 1b: Validate Brevo'
        env:
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}
        run: npx nx run @temp-nx/company-website:validate:brevo

  validate-imagekit:
    needs: validate-keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 1c: Validate ImageKit'
        env:
          VITE_IMAGEKIT_PUBLIC_KEY: ${{ secrets.VITE_IMAGEKIT_PUBLIC_KEY }}
          VITE_IMAGEKIT_PRIVATE_KEY: ${{ secrets.VITE_IMAGEKIT_PRIVATE_KEY }}
        run: npx nx run @temp-nx/company-website:validate:imagekit

  validate-recaptcha:
    needs: validate-keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: 'Phase 1d: Validate reCAPTCHA'
        env:
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
        run: npx nx run @temp-nx/company-website:validate:recaptcha

  audit:
    needs:
      [validate-firebase, validate-brevo, validate-imagekit, validate-recaptcha]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --legacy-peer-deps

      - name: 'Install Playwright Browsers'
        run: npx playwright install --with-deps chromium

      - name: 'Production Build'
        run: npx nx build @temp-nx/company-website --configuration=production

      - name: 'Phase 2: Generate Sitemap & Robots'
        run: npx nx run @temp-nx/company-website:generate-sitemap

      - name: 'Deploy to Firebase Preview'
        id: deploy_preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: 'pr-${{ github.event.number }}'

      - name: 'Phase 3: Live Audit & E2E'
        run: npx nx run @temp-nx/company-website:audit
        env:
          BASE_URL: ${{ steps.deploy_preview.outputs.details_url }}
          VITE_PROJECT_URL: ${{ steps.deploy_preview.outputs.details_url }}
          NX_PSEUDO_TERMINAL: false

      - name: 'Phase 4: Lighthouse Performance Audit'
        run: npx tsx scripts/pipeline/06-run-lighthouse.ts ${{ steps.deploy_preview.outputs.details_url }}
        env:
          BASE_URL: ${{ steps.deploy_preview.outputs.details_url }}

      - name: 'Generate Unified Quality Report'
        run: npx tsx scripts/automation/generate-report.ts

      - name: 'Upload Quality Reports (Artifacts)'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports-pr-${{ github.event.number }}
          path: reports/
          retention-days: 14
