name: PR Quality Audit 🛡️

on:
  pull_request:
    branches: [main]

jobs:
  validate-label:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Label
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')

          if echo "$LABELS" | grep -qE 'major|minor|patch'; then
            echo "✅ PR has valid version label"
            exit 0
          else
            echo "❌ PR must have a version label: major, minor, or patch"
            echo ""
            echo "Add a label with:"
            echo "  gh pr edit ${{ github.event.pull_request.number }} --add-label \"minor\""
            echo ""
            echo "Or via GitHub UI: Labels → Select major/minor/patch"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build and Audit
        run: |
          npx nx build @temp-nx/agency-shell
          npx nx run @temp-nx/agency-shell:audit
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_PROJECT_URL: https://preview.qubits-digital.de

      - name: Upload Quality Report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: VALIDATION_REPORT.md
