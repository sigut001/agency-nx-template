name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    # Wir stellen sicher, dass dies nur im Template-Repo läuft, wenn es als Haupt-Repo agiert
    # oder wir passen es so an, dass es im Submodule-Kontext funktioniert.
    # Für das Template-Repo selbst ist das korrekt.
    if: github.repository_owner == 'sigut001'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: templates/agency-nx-template/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: templates/agency-nx-template

      - name: Determine Version Bump
        id: version
        shell: bash
        run: |
          # Label aus letztem gemergten PR auslesen
          LABELS=$(gh pr list --state merged --limit 1 --json labels --jq '.[0].labels[].name')

          if echo "$LABELS" | grep -q "major"; then
            echo "bump=major" >> $GITHUB_OUTPUT
            echo "💥 MAJOR version bump (breaking changes)"
          elif echo "$LABELS" | grep -q "minor"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "✨ MINOR version bump (new features)"
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "🐛 PATCH version bump (bugfixes)"
          fi
        working-directory: templates/agency-nx-template
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Version
        id: bump
        run: |
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        working-directory: templates/agency-nx-template

      - name: Production Build
        run: npx nx run agency-shell:build --configuration=production
        working-directory: templates/agency-nx-template

      - name: Generate SEO Files
        run: npx nx run agency-shell:generate-seo-files
        working-directory: templates/agency-nx-template

      - name: Deploy to Production
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "Deploying to Firebase Production..."
          # npx firebase-tools deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --token $FIREBASE_TOKEN
        working-directory: templates/agency-nx-template

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main --tags
        working-directory: templates/agency-nx-template

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ steps.bump.outputs.new_version }}'
          generate_release_notes: true
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
