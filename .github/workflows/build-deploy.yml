name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    # Wir stellen sicher, dass dies nur im Template-Repo läuft, wenn es als Haupt-Repo agiert
    # oder wir passen es so an, dass es im Submodule-Kontext funktioniert.
    # Für das Template-Repo selbst ist das korrekt.
    if: github.repository_owner == 'sigut001'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: .

      - name: Determine Version Bump
        id: version
        shell: bash
        run: |
          # Label aus letztem gemergten PR auslesen
          LABELS=$(gh pr list --state merged --limit 1 --json labels --jq '.[0].labels[].name')
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if echo "$LABELS" | grep -q "major" || [[ "$COMMIT_MSG" == *"#major"* ]]; then
            echo "bump=major" >> $GITHUB_OUTPUT
            echo "💥 MAJOR version bump detected"
          elif echo "$LABELS" | grep -q "minor" || [[ "$COMMIT_MSG" == *"#minor"* ]]; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "✨ MINOR version bump detected"
          elif echo "$LABELS" | grep -q "patch" || [[ "$COMMIT_MSG" == *"#patch"* ]]; then
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "🐛 PATCH version bump detected"
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "ℹ️ No specific label/tag found, defaulting to PATCH"
          fi
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Version
        id: bump
        run: |
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        working-directory: .

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main --tags
        working-directory: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ steps.bump.outputs.new_version }}'
          generate_release_notes: true
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Production Build'
        run: npx nx build @temp-nx/company-website --configuration=production
        working-directory: .

      - name: 'Deploy to Firebase Production'
        id: deploy_prod
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: live

      - name: 'Phase 7: Lighthouse Final Audit'
        run: npx tsx scripts/pipeline/06-run-lighthouse.ts ${{ steps.deploy_prod.outputs.details_url }}
        env:
          BASE_URL: ${{ steps.deploy_prod.outputs.details_url }}

      - name: 'Generate Unified Quality Report'
        run: npx tsx scripts/automation/generate-report.ts

      - name: 'Upload Release Quality Reports'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-quality-reports-v${{ steps.bump.outputs.new_version }}
          path: reports/
          retention-days: 60
