name: 'CI: PR Validation (WF-2) 🛡️'

on:
  pull_request:
    branches: [main]

jobs:
  metadata-check:
    name: 'Standard PR Metadata Check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 'Check PR for Versioning Tags'
        shell: bash
        run: |
          TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title --jq '.title')
          BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body --jq '.body')
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')

          if echo "$TITLE" | grep -iqE "#major|#minor|#patch" || \
             echo "$BODY" | grep -iqE "#major|#minor|#patch" || \
             echo "$LABELS" | grep -iqE "major|minor|patch"; then
            echo "✅ PR has valid versioning metadata"
            exit 0
          else
            echo "❌ PR must contain a versioning tag (#major, #minor, #patch) or label."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validation-core:
    name: 'Business Logic Validation'
    needs: metadata-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Firebase Service Account
        run: |
          node -e "require('fs').writeFileSync('firebase-service-account.json', JSON.stringify({type: 'service_account', project_id: process.env.PROJECT_ID, private_key: process.env.PRIVATE_KEY.replace(/\\\\n/g, '\\n'), client_email: process.env.CLIENT_EMAIL}))"
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: 'NX Validation (Phases 02-05)'
        run: npx nx run @temp-nx/company-website:validate
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_HUBSPOT_PORTAL_ID: ${{ secrets.VITE_HUBSPOT_PORTAL_ID }}
          VITE_HUBSPOT_REGION: ${{ secrets.VITE_HUBSPOT_REGION }}
          VITE_IMAGEKIT_PUBLIC_KEY: ${{ secrets.VITE_IMAGEKIT_PUBLIC_KEY }}
          VITE_IMAGEKIT_PRIVATE_KEY: ${{ secrets.VITE_IMAGEKIT_PRIVATE_KEY }}
          VITE_IMAGEKIT_URL_ENDPOINT: ${{ secrets.VITE_IMAGEKIT_URL_ENDPOINT }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}

      - name: 'Generate Job Summary'
        if: always()
        run: |
          if [ -f "reports/FINAL_SUMMARY.md" ]; then
            cat reports/FINAL_SUMMARY.md >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Validation Summary not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 'Upload Validation Reports'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: reports/
